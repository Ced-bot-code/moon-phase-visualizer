<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Moon Phase visualizer</title>
<style>
  body {
    background: #000;
    color: #fff;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    text-align: center;
    margin: 0;
    padding: 20px;
  }
  canvas {
    background: radial-gradient(circle, #111 0%, #000 70%);
    display: block;
    margin: 20px auto;
    border-radius: 50%;
    box-shadow: 0 0 50px rgba(255,255,255,0.05);
    width: 90%;
    max-width: 300px;
    height: auto;
  }
  .controls {
    max-width: 400px;
    margin: 20px auto;
    text-align: left;
    background: #111;
    padding: 20px;
    border-radius: 12px;
    border: 1px solid #222;
  }
  label {
    display: block;
    margin: 15px 0;
    font-size: 14px;
    color: #aaa;
  }
  input[type="range"] {
    width: 100%;
    margin-top: 8px;
    cursor: pointer;
  }
  .info-panel {
    max-width: 600px;
    margin: 20px auto;
    line-height: 1.6;
    color: #ccc;
  }
  #disp {
    display: block;
    font-size: 1.2rem;
    font-weight: bold;
    color: #00d4ff;
    margin-bottom: 10px;
  }
  hr { border: 0; border-top: 1px solid #333; margin: 20px 0; }
</style>
</head>
<body>

  <h2>Moon phase</h2>
  
  <canvas id="canvas" width="300" height="300"></canvas>
  
  <div class="controls">
    <span id="disp">New Moon</span>
    
    <label>Phase
      <input type="range" min="0" max="1" step="0.001" id="phase" value="0.25">
    </label>

    <label>Rotation
      <input type="range" min="0" max="360" step="1" id="angle" value="0">
    </label>

    <label>Distance
      <input type="range" min="31.44" max="32.55" step="0.01" id="distance" value="31.44">
    </label>

    <label>Altitude
      <input type="range" min="-90" max="90" step="1" id="altitude" value="45">
    </label>
  </div>

  <div class="info-panel">
    <div id="details"></div>
    <hr>
    <h3>About This Implementation</h3>
    <p>Developed using a pure and raw JS Canvas API</p>
    <p>Created by <strong>Cedie Camomot. See license for details</strong></p>
  </div>
<script src="moonPhaseModel.js"></script>
<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const disp = document.getElementById("disp");
const details = document.getElementById("details");

const sliders = {
  phase: document.getElementById("phase"),
  angle: document.getElementById("angle"),
  distance: document.getElementById("distance"),
  altitude: document.getElementById("altitude")
};
  
// Event Listeners
Object.values(sliders).forEach(s => s.addEventListener("input", drawMoon));

// Initial Draw
drawMoon();
</script>

</body>
</html>
