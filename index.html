<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Moon Phase visualizer</title>
<style>
  body {
    background: #000;
    color: #fff;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    text-align: center;
    margin: 0;
    padding: 20px;
  }
  canvas {
    background: radial-gradient(circle, #111 0%, #000 70%);
    display: block;
    margin: 20px auto;
    box-shadow: 0 0 50px rgba(255,255,255,0.05);
    width: 90%;
    max-width: 300px;
    height: auto;
  }
  .controls {
    max-width: 400px;
    margin: 20px auto;
    text-align: left;
    background: #111;
    padding: 20px;
    border-radius: 12px;
    border: 1px solid #222;
  }
  label {
    display: block;
    margin: 15px 0;
    font-size: 14px;
    color: #aaa;
  }
  input[type="range"] {
    width: 100%;
    margin-top: 8px;
    cursor: pointer;
  }
  .info-panel {
    max-width: 600px;
    margin: 20px auto;
    line-height: 1.6;
    color: #ccc;
  }
  #disp {
    display: block;
    font-size: 1.2rem;
    font-weight: bold;
    color: #00d4ff;
    margin-bottom: 10px;
  }
  hr { border: 0; border-top: 1px solid #333; margin: 20px 0; }
</style>
</head>
<body>

  <h2>Moon phase</h2>
  
  <canvas id="canvasId" width="300" height="300"></canvas>
  
  <div class="controls">
    <span id="disp">New Moon</span>
    
    <label>Phase
      <input type="range" min="0" max="1" step="0.0000001" id="phase" value="0.25">
    </label>

    <label>Rotation
      <input type="range" min="0" max="360" step="1" id="angle" value="0">
    </label>

    <label>Distance (km)
      <input type="range" min="356400" max="406700" step="100" id="distance" value="384400">
    </label>

    <label>Altitude
      <input type="range" min="-90" max="90" step="1" id="altitude" value="45">
    </label>
  </div>

  <div class="info-panel">
    <div id="details"></div>
    <hr>
    <h3>About This Implementation</h3>
    <p>Developed using a pure and raw JS Canvas API</p>
    <p>Created by <strong>Cedie Camomot. See license for details</strong></p>
  </div>
<script src="moonPhaseModel.js"></script>
<script>

const disp = document.getElementById("disp");
const details = document.getElementById("details");

// Set here for an inputs
const sliders = {
  phase: document.getElementById("phase"),
  rotation: document.getElementById("angle"),
  distance: document.getElementById("distance"),
  altitude: document.getElementById("altitude")
};
  
function initializeAnimation() {
  // Draw the Moon based on current slider values
  // drawMoon(canvasId:HTMLIdAttr, input:obj)
  drawMoon("canvasId", sliders);
    // Logic for Labels and Info

  const kNum = parseFloat(sliders.phase.value)
      , key = getPhaseKey(kNum)
      , illum = kNum <= 0.5 ? (kNum / 0.5) * 100 : ((1 - kNum) / 0.5) * 100
      , AppAltitude = parseFloat(sliders.altitude.value)
      , curdist = parseFloat(sliders.distance.value);
  
  disp.innerHTML = `${key}`;
  details.innerHTML = `
    Illumination: <strong>${illum.toFixed(2)}%</strong><br>
    Distance: <strong>${curdist.toLocaleString()} km</strong><br>
    Altitude: <strong>${AppAltitude}°</strong>
  `;
}

// Event Listeners
Object.values(sliders).forEach(s => s.addEventListener("input", initializeAnimation));

// Initial animation setup
initializeAnimation();
</script>

</body>
</html>
